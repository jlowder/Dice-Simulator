<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Physics Dice Roller</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                height: 100vh;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }
            .header {
                padding: 20px;
                text-align: center;
                color: white;
            }
            .header h1 {
                margin-bottom: 10px;
            }
            .controls {
                display: flex;
                justify-content: center;
                gap: 20px;
                padding: 20px;
                background: rgba(0, 0, 0, 0.3);
            }
            .control-group {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .control-group label {
                color: #eee;
                margin-bottom: 5px;
                font-size: 14px;
            }
            .control-group input[type="number"],
            .control-group button {
                padding: 10px 20px;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                text-align: center;
            }
            .control-group input[type="number"] {
                width: 80px;
                background: #2a2a4e;
                color: white;
            }
            .control-group button {
                background: #4a6fa5;
                color: white;
                cursor: pointer;
                transition: background 0.3s;
            }
            .control-group button:hover {
                background: #5b85c1;
            }
            .canvas-container {
                flex: 1;
                position: relative;
                width: 100%;
                height: 100%;
            }
            #canvas {
                width: 100%;
                height: 100%;
                display: block;
            }
            .instructions {
                text-align: center;
                padding: 15px;
                color: #ccc;
                font-size: 14px;
            }
            #result {
                position: absolute;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                padding: 15px 30px;
                background: rgba(0, 0, 0, 0.8);
                color: white;
                border-radius: 10px;
                font-size: 24px;
                font-weight: bold;
                opacity: 0;
                transition: opacity 0.3s;
                pointer-events: none;
            }
            #result.show {
                opacity: 1;
            }
            .radio-group {
                display: flex;
                background: #2a2a4e;
                padding: 5px;
                border-radius: 8px;
            }
            .radio-label {
                cursor: pointer;
            }
            .radio-label input {
                display: none;
            }
            .radio-label span {
                display: inline-block;
                padding: 8px 16px;
                border-radius: 6px;
                color: #ccc;
                transition: all 0.3s;
            }
            .radio-label input:checked + span {
                background: #4a6fa5;
                color: white;
            }
        </style>
    </head>
    <body>
        <div class="header">
            <h1></h1>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Dice Type</label>
                <div class="radio-group" id="sidesGroup">
                    <label class="radio-label">
                        <input type="radio" name="sides" value="6" checked>
                        <span>D6</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="sides" value="20">
                        <span>D20</span>
                    </label>
                </div>
            </div>
            <div class="control-group">
                <button id="rollBtn">Roll Dice</button>
            </div>
        </div>

        <div class="canvas-container" id="canvasContainer">
            <canvas id="canvas"></canvas>
            <div id="result"></div>
        </div>

        <div class="instructions">
            Click "Roll Dice" button or drag with mouse to throw
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
        <script src="dice-roller.js"></script>
    </body>
</html>
