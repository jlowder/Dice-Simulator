<!DOCTYPE html>
<html>
<head>
    <title>Dice Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>
    <div id="canvas-container" style="width: 100vw; height: 100vh;"></div>
    <script>
        try {
            // Create scene
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            // Create camera
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            
            // Create renderer
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            // Create dice
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            const material = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x222222 });
            const dice = new THREE.Mesh(geometry, material);
            scene.add(dice);
            
            // Add light
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light);
            
            const ambient = new THREE.AmbientLight(0x404040);
            scene.add(ambient);
            
            // Animation loop
            function animate() {
                requestAnimationFrame(animate);
                dice.rotation.x += 0.01;
                dice.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            
            animate();
            console.log('Three.js test: SUCCESS - White cube should be visible');
        } catch (e) {
            console.error('Three.js test: FAILED -', e.message);
        }
    </script>
</body>
</html>
