<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Simple Dice Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; }
    </style>
</head>
<body>
    <div id="canvas-container" style="width: 100vw; height: 100vh;"></div>
    <script>
        try {
            console.log('Starting test...');
            
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            console.log('Scene created');
            
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            console.log('Camera created');
            
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            console.log('Renderer created, canvas added');
            
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            const material = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const dice = new THREE.Mesh(geometry, material);
            scene.add(dice);
            console.log('Dice added to scene');
            
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light);
            console.log('Light added');
            
            function animate() {
                requestAnimationFrame(animate);
                dice.rotation.x += 0.01;
                dice.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            
            animate();
            console.log('Animation started - dice should be visible');
        } catch (e) {
            console.error('ERROR:', e.message, e.stack);
        }
    </script>
</body>
</html>
